name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff pytest pip-audit
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Test (pytest)
        run: pytest -q
      # Hard gate: a critical Python CVE blocks merging. Run after tests so a
      # vuln doesn't hide a build failure.
      - name: Audit Python deps (pip-audit)
        run: pip-audit -r requirements.txt

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/web/package-lock.json
      - run: npm ci
      - name: Type-check (tsc)
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      # Non-blocking dependency audit (see backend note above).
      - name: Audit npm deps
        continue-on-error: true
        run: npm audit --audit-level=high

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Lint
        run: |
          chmod +x ./gradlew
          ./gradlew lint --no-daemon
      - name: Unit tests
        run: ./gradlew test --no-daemon
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
